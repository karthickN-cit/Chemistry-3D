<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Chemistry Lab – 3D Interactive</title>
  <meta name="description" content="An interactive 3D virtual chemistry lab built with Three.js. Mix chemicals, control temperature, and observe reactions in real-time." />

  <!-- FontAwesome for UI icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       ROOT VARIABLES & RESET
       ============================================================ */
    :root {
      --glass-bg: rgba(10, 14, 28, 0.72);
      --glass-border: rgba(100, 180, 255, 0.18);
      --glass-blur: blur(14px);
      --accent-blue: #4fc3f7;
      --accent-cyan: #00e5ff;
      --accent-green: #69f0ae;
      --accent-orange: #ffab40;
      --accent-purple: #ce93d8;
      --accent-red: #ff5252;
      --text-primary: #e8f4fd;
      --text-secondary: #90a4ae;
      --sidebar-width: 300px;
      --hud-height: 90px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #050810;
      color: var(--text-primary);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* ============================================================
       THREE.JS CANVAS – Full Screen, Behind All UI
       ============================================================ */
    #lab-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      display: block;
    }

    /* ============================================================
       GLASSMORPHIC PANEL – Shared Base Style
       ============================================================ */
    .glass-panel {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45),
                  inset 0 1px 0 rgba(255,255,255,0.06);
    }

    /* ============================================================
       SIDEBAR – Chemical Inventory
       ============================================================ */
    #sidebar {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: var(--sidebar-width);
      z-index: 10;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 90vh;
      overflow-y: auto;
    }

    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-track { background: transparent; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }

    .sidebar-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent-cyan);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-title i { font-size: 13px; }

    .section-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Inventory Chemical Buttons */
    .chem-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: left;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .chem-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .chem-btn:hover { 
      transform: translateX(4px);
      border-color: rgba(79, 195, 247, 0.35);
      background: rgba(79, 195, 247, 0.08);
      box-shadow: 0 4px 20px rgba(79, 195, 247, 0.12), 4px 0 0 var(--accent-cyan) inset;
    }

    .chem-btn:hover::before { opacity: 1; }

    .chem-btn:active { transform: translateX(2px) scale(0.98); }

    .chem-btn.active {
      border-color: var(--accent-green);
      background: rgba(105, 240, 174, 0.10);
      box-shadow: 0 0 20px rgba(105, 240, 174, 0.2), 4px 0 0 var(--accent-green) inset;
    }

    .chem-btn .btn-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    .btn-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .btn-name { font-weight: 600; font-size: 13px; }
    .btn-formula { font-size: 10px; color: var(--text-secondary); font-style: italic; }

    .btn-badge {
      margin-left: auto;
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    .badge-base  { background: rgba(206,147,216,0.2); color: var(--accent-purple); border: 1px solid rgba(206,147,216,0.3); }
    .badge-acid  { background: rgba(255,82,82,0.2); color: var(--accent-red); border: 1px solid rgba(255,82,82,0.3); }
    .badge-salt  { background: rgba(79,195,247,0.2); color: var(--accent-blue); border: 1px solid rgba(79,195,247,0.3); }
    .badge-ind   { background: rgba(255,171,64,0.2); color: var(--accent-orange); border: 1px solid rgba(255,171,64,0.3); }
    .badge-tool  { background: rgba(105,240,174,0.2); color: var(--accent-green); border: 1px solid rgba(105,240,174,0.3); }

    /* ============================================================
       HUD PANEL – Top Center Data Readout
       ============================================================ */
    #hud-panel {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: 16px 28px;
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .hud-metric {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      min-width: 80px;
    }

    .hud-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .hud-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent-cyan);
      transition: color 0.5s ease;
      white-space: nowrap;
    }

    .hud-unit {
      font-size: 9px;
      color: var(--text-secondary);
      margin-top: -3px;
    }

    .hud-divider {
      width: 1px;
      height: 40px;
      background: var(--glass-border);
    }

    .hud-substance {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent-cyan);
      max-width: 160px;
      text-align: center;
      line-height: 1.4;
    }

    /* pH color animation */
    #ph-value.acidic   { color: var(--accent-red); }
    #ph-value.neutral  { color: var(--accent-cyan); }
    #ph-value.alkaline { color: var(--accent-purple); }

    /* Temp color animation */
    #temp-value.cold { color: var(--accent-blue); }
    #temp-value.warm { color: var(--accent-orange); }
    #temp-value.hot  { color: var(--accent-red); }

    /* ============================================================
       CONTROL BAR – Bottom Center
       ============================================================ */
    #control-bar {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: 14px 24px;
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .ctrl-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 11px 20px;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
    }

    .ctrl-btn i { font-size: 14px; }

    .ctrl-btn:hover {
      border-color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.10);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .ctrl-btn:active { transform: translateY(0px) scale(0.97); }

    #btn-reset:hover { border-color: var(--accent-blue); box-shadow: 0 0 20px rgba(79,195,247,0.2); }
    #btn-heat { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
    #btn-heat.heat-on {
      border-color: var(--accent-orange);
      background: rgba(255,171,64,0.12);
      color: var(--accent-orange);
      box-shadow: 0 0 24px rgba(255,171,64,0.25);
    }

    #btn-stir:hover { border-color: var(--accent-green); box-shadow: 0 0 20px rgba(105,240,174,0.2); }
    #btn-stir.stirring { border-color: var(--accent-green); color: var(--accent-green); animation: spin-icon 1s linear infinite; }

    @keyframes spin-icon { to { transform: rotate(360deg); } /* icon only via child */ }
    #btn-stir.stirring i { animation: spin-i 0.8s linear infinite; display: inline-block; }
    @keyframes spin-i { to { transform: rotate(360deg); } }

    /* ============================================================
       NOTIFICATION TOAST
       ============================================================ */
    #toast {
      position: absolute;
      top: 130px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      z-index: 20;
      padding: 10px 20px;
      border-radius: 30px;
      background: rgba(10,14,28,0.9);
      border: 1px solid var(--glass-border);
      font-size: 12px;
      font-weight: 500;
      color: var(--accent-cyan);
      backdrop-filter: blur(10px);
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    #toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ============================================================
       REACTION LOG
       ============================================================ */
    #reaction-log {
      position: absolute;
      right: 20px;
      bottom: 90px;
      z-index: 10;
      width: 260px;
      max-height: 220px;
      overflow-y: auto;
      padding: 14px 16px;
    }

    #reaction-log::-webkit-scrollbar { width: 3px; }
    #reaction-log::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }

    .log-title {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .log-title i { color: var(--accent-cyan); }

    .log-entry {
      font-size: 11px;
      color: var(--text-secondary);
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      line-height: 1.5;
      animation: fadeInLog 0.4s ease;
    }

    .log-entry .log-time { color: var(--accent-cyan); margin-right: 6px; font-family: 'Orbitron', sans-serif; font-size: 9px; }
    .log-entry .log-highlight { color: var(--text-primary); font-weight: 500; }

    @keyframes fadeInLog { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    /* ============================================================
       LOADING OVERLAY
       ============================================================ */
    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: #050810;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.8s ease;
    }

    #loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .loading-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 3px;
    }

    .loading-bar-wrap {
      width: 240px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
      border-radius: 2px;
      animation: loadFill 1.4s ease forwards;
    }

    @keyframes loadFill { to { width: 100%; } }

    .loading-sub {
      font-size: 11px;
      color: var(--text-secondary);
      letter-spacing: 1.5px;
    }

    /* ============================================================
       INDICATOR ACTIVE PULSE
       ============================================================ */
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(105,240,174,0.4); }
      50%       { box-shadow: 0 0 0 8px rgba(105,240,174,0); }
    }

    .chem-btn.active { animation: pulse-glow 2s infinite; }

    /* ============================================================
       RESPONSIVE TWEAKS
       ============================================================ */
    @media (max-width: 900px) {
      #sidebar { width: 230px; left: 10px; }
      #hud-panel { gap: 16px; padding: 12px 16px; }
      .hud-value { font-size: 14px; }
      #reaction-log { display: none; }
    }
  </style>
</head>
<body>

<!-- ============================================================
     LOADING OVERLAY
     ============================================================ -->
<div id="loading-overlay" role="status" aria-label="Loading chemistry lab">
  <div class="loading-logo">⚗ CHEM LAB 3D</div>
  <div class="loading-bar-wrap"><div class="loading-bar-fill"></div></div>
  <div class="loading-sub">Initializing Virtual Laboratory…</div>
</div>

<!-- ============================================================
     THREE.JS CANVAS
     ============================================================ -->
<canvas id="lab-canvas" aria-label="3D Chemistry Lab Viewport"></canvas>

<!-- ============================================================
     HUD PANEL – Top Centre
     ============================================================ -->
<div id="hud-panel" class="glass-panel" role="status" aria-label="Chemistry Metrics Display" aria-live="polite">
  <div class="hud-metric">
    <span class="hud-label">Substance</span>
    <span class="hud-value hud-substance" id="hud-substance">Distilled Water</span>
  </div>
  <div class="hud-divider"></div>
  <div class="hud-metric">
    <span class="hud-label">Volume</span>
    <span class="hud-value" id="hud-volume">100</span>
    <span class="hud-unit">mL</span>
  </div>
  <div class="hud-divider"></div>
  <div class="hud-metric">
    <span class="hud-label">Temperature</span>
    <span class="hud-value neutral" id="temp-value">20.0</span>
    <span class="hud-unit">°C</span>
  </div>
  <div class="hud-divider"></div>
  <div class="hud-metric">
    <span class="hud-label">pH Level</span>
    <span class="hud-value neutral" id="ph-value">7.0</span>
    <span class="hud-unit">pH</span>
  </div>
</div>

<!-- ============================================================
     SIDEBAR – Chemical Inventory
     ============================================================ -->
<nav id="sidebar" class="glass-panel" aria-label="Chemical Inventory">
  <div class="sidebar-title">
    <i class="fas fa-flask"></i>
    Chemical Inventory
  </div>

  <span class="section-label">Indicators</span>

  <button class="chem-btn" id="btn-phenol" aria-label="Add Phenolphthalein Indicator">
    <div class="btn-icon" style="background: rgba(255,171,64,0.15); color: #ffab40;">
      <i class="fas fa-eye-dropper"></i>
    </div>
    <div class="btn-info">
      <span class="btn-name">Phenolphthalein</span>
      <span class="btn-formula">C₂₀H₁₄O₄ – Indicator</span>
    </div>
    <span class="btn-badge badge-ind">IND</span>
  </button>

  <button class="chem-btn" id="btn-litmus" aria-label="Add Universal Indicator">
    <div class="btn-icon" style="background: rgba(206,147,216,0.15); color: #ce93d8;">
      <i class="fas fa-palette"></i>
    </div>
    <div class="btn-info">
      <span class="btn-name">Universal Indicator</span>
      <span class="btn-formula">Mixed dye solution</span>
    </div>
    <span class="btn-badge badge-ind">IND</span>
  </button>

  <span class="section-label" style="margin-top:4px;">Bases</span>

  <button class="chem-btn" id="btn-naoh" aria-label="Add Sodium Hydroxide solution">
    <div class="btn-icon" style="background: rgba(206,147,216,0.15); color: #ce93d8;">
      <i class="fas fa-arrow-up"></i>
    </div>
    <div class="btn-info">
      <span class="btn-name">Sodium Hydroxide</span>
      <span class="btn-formula">NaOH – Strong Base</span>
    </div>
    <span class="btn-badge badge-base">BASE</span>
  </button>

  <button class="chem-btn" id="btn-nh3" aria-label="Add Ammonia solution">
    <div class="btn-icon" style="background: rgba(79,195,247,0.12); color: #4fc3f7;">
      <i class="fas fa-wind"></i>
    </div>
    <div class="btn-info">
      <span class="btn-name">Ammonia</span>
      <span class="btn-formula">NH₃ – Weak Base</span>
    </div>
    <span class="btn-badge badge-base">BASE</span>
  </button>

  <span class="section-label" style="margin-top:4px;">Acids</span>

  <button class="chem-btn" id="btn-hcl" aria-label="Add Hydrochloric Acid">
    <div class="btn-icon" style="background: rgba(255,82,82,0.15); color: #ff5252;">
      <i class="fas fa-arrow-down"></i>
    </div>
    <div class="btn-info">
      <span class="btn-name">Hydrochloric Acid</span>
      <span class="btn-formula">HCl – Strong Acid</span>
    </div>
    <span class="btn-badge badge-acid">ACID</span>
  </button>

  <button class="chem-btn" id="btn-h2so4" aria-label="Add Sulfuric Acid">
    <div class="btn-icon" style="background: rgba(255,82,82,0.12); color: #ff7043;">
      <i class="fas fa-exclamation-triangle"></i>
    </div>
    <div class="btn-info">
      <span class="btn-name">Sulfuric Acid</span>
      <span class="btn-formula">H₂SO₄ – Strong Acid</span>
    </div>
    <span class="btn-badge badge-acid">ACID</span>
  </button>

  <span class="section-label" style="margin-top:4px;">Salts & Solutions</span>

  <button class="chem-btn" id="btn-cuso4" aria-label="Add Copper Sulfate">
    <div class="btn-icon" style="background: rgba(79,195,247,0.15); color: #29b6f6;">
      <i class="fas fa-cubes"></i>
    </div>
    <div class="btn-info">
      <span class="btn-name">Copper Sulfate</span>
      <span class="btn-formula">CuSO₄ – Salt solution</span>
    </div>
    <span class="btn-badge badge-salt">SALT</span>
  </button>

  <button class="chem-btn" id="btn-kmno4" aria-label="Add Potassium Permanganate">
    <div class="btn-icon" style="background: rgba(156,39,176,0.15); color: #ab47bc;">
      <i class="fas fa-gem"></i>
    </div>
    <div class="btn-info">
      <span class="btn-name">Potassium Permanganate</span>
      <span class="btn-formula">KMnO₄ – Oxidizer</span>
    </div>
    <span class="btn-badge badge-salt">SALT</span>
  </button>

  <button class="chem-btn" id="btn-nacl" aria-label="Add Sodium Chloride">
    <div class="btn-icon" style="background: rgba(255,255,255,0.08); color: #cfd8dc;">
      <i class="fas fa-snowflake"></i>
    </div>
    <div class="btn-info">
      <span class="btn-name">Sodium Chloride</span>
      <span class="btn-formula">NaCl – Table Salt</span>
    </div>
    <span class="btn-badge badge-salt">SALT</span>
  </button>
</nav>

<!-- ============================================================
     CONTROL BAR – Bottom Centre
     ============================================================ -->
<div id="control-bar" class="glass-panel" role="toolbar" aria-label="Lab Controls">
  <button class="ctrl-btn" id="btn-reset" aria-label="Reset Lab Environment">
    <i class="fas fa-undo-alt"></i>
    Reset Lab
  </button>
  <button class="ctrl-btn" id="btn-heat" aria-label="Toggle Bunsen Burner">
    <i class="fas fa-fire"></i>
    Bunsen Burner
  </button>
  <button class="ctrl-btn" id="btn-stir" aria-label="Stir Solution">
    <i class="fas fa-sync-alt"></i>
    Stir Solution
  </button>
  <button class="ctrl-btn" id="btn-pour" aria-label="Pour solution (partial pour-off)">
    <i class="fas fa-tint"></i>
    Pour Off
  </button>
</div>

<!-- ============================================================
     REACTION LOG
     ============================================================ -->
<div id="reaction-log" class="glass-panel" aria-label="Reaction History Log" aria-live="polite">
  <div class="log-title"><i class="fas fa-scroll"></i> Reaction Log</div>
  <!-- Log entries inserted here by JS -->
</div>

<!-- ============================================================
     TOAST NOTIFICATION
     ============================================================ -->
<div id="toast" role="alert" aria-live="assertive"></div>

<!-- ============================================================
     THREE.JS + ORBIT CONTROLS
     ============================================================ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
'use strict';
/* ==============================================================
   VIRTUAL CHEMISTRY LAB – Main Application Script
   Author: AI Frontend Developer (Antigravity / Claude)
   Description: Single-file 3D interactive chemistry lab using
                Three.js r128 with procedural geometry, a
                lightweight chemistry state machine, and a
                full particle system for flames and steam.
   ============================================================== */

// ---------------------------------------------------------------
// 1. CHEMISTRY STATE MACHINE
//    Holds all mutable lab state; drives HUD + visual outputs.
// ---------------------------------------------------------------
const LabState = {
  substance: 'Distilled Water',
  volume: 100,           // mL
  temperature: 20.0,     // °C
  pH: 7.0,
  heatOn: false,
  stirring: false,
  indicatorPhenol: false,  // Phenolphthalein present?
  indicatorUniversal: false,

/* --- Flame Particles (Bunsen Burner) ---
   Uses THREE.Points with a custom vertex shader-style approach
   via geometry attributes + animated positions in the render loop.
*/
const FLAME_COUNT = 280;
const flameGeometry = new THREE.BufferGeometry();
const flamePositions = new Float32Array(FLAME_COUNT * 3);
const flameSpeeds   = new Float32Array(FLAME_COUNT);
const flameLifetimes = new Float32Array(FLAME_COUNT);
const flameSizes     = new Float32Array(FLAME_COUNT);

// Initialise flame particle attributes
function initFlameParticle(i) {
  const r = Math.random() * 0.09;
  const theta = Math.random() * Math.PI * 2;
  flamePositions[i * 3 + 0] = Math.cos(theta) * r;      // X spread
  flamePositions[i * 3 + 1] = Math.random() * 0.05;     // Y = near nozzle
  flamePositions[i * 3 + 2] = Math.sin(theta) * r;      // Z spread
  flameSpeeds[i]    = 0.4 + Math.random() * 0.8;
  flameLifetimes[i] = Math.random();
  flameSizes[i]     = 6 + Math.random() * 12;
}

for (let i = 0; i < FLAME_COUNT; i++) initFlameParticle(i);

flameGeometry.setAttribute('position', new THREE.BufferAttribute(flamePositions, 3));
flameGeometry.setAttribute('size',     new THREE.BufferAttribute(flameSizes, 1));

// Create circular gradient sprite texture for particles
function createCircleTexture(size, colour) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const grad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  grad.addColorStop(0,   colour);
  grad.addColorStop(0.4, colour.replace('1)', '0.6)'));
  grad.addColorStop(1,   colour.replace('1)', '0)'));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(c);
}

  size: 0.14,
  map: flameTex,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexColors: false,
  sizeAttenuation: true,
  color: 0xff8820,
});

/**
 * Push a timestamped entry to the on-screen reaction log.
 * @param {string} text – HTML string to display
 */
function logReaction(text) {
  const log = document.getElementById('reaction-log');
  const now = new Date();
  const ts = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="log-time">${ts}</span>${text}`;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

/**
 * Show a brief toast notification at the top of the screen.
 * @param {string} msg
 * @param {number} duration – ms
 */
function showToast(msg, duration = 2800) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('visible');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => toast.classList.remove('visible'), duration);
}

/**
 * Derive the human-readable substance label from the current state.
 */
function updateSubstanceLabel() {
  const s = LabState;
  let label = 'Mixed Solution';

  if (!s.hasBase && !s.hasAcid && !s.compounds.length) {
    label = 'Distilled Water';
  } else if (s.compounds.includes('CuSO₄')) {
    label = s.compounds.includes('NaOH') ? 'Cu(OH)₂ Precipitate' : 'CuSO₄ (aq)';
  } else if (s.compounds.includes('KMnO₄')) {
    label = 'KMnO₄ Solution';
  } else if (s.hasBase && !s.hasAcid) {
    label = s.compounds.includes('NaOH') ? 'NaOH Solution' : 'NH₃ (aq)';
  } else if (s.hasAcid && !s.hasBase) {
    label = s.compounds.includes('HCl') ? 'HCl Solution' : 'H₂SO₄ (aq)';
  } else if (s.hasBase && s.hasAcid) {
    label = 'Neutralisation Rxn';
  }

  if (s.temperature >= 100) label += ' (Boiling)';

  s.substance = label;
}

/**
 * Recompute the liquid target color based on current state.
 */
function recomputeTargetColor() {
  const s = LabState;
  const pH = s.pH;

  // Priority order: specialty reagent > indicator > pH naked
  if (s.compounds.includes('KMnO₄')) {
    s.targetColor.set(0x6a1b9a);   // Deep purple
    return;
  }

  if (s.compounds.includes('CuSO₄')) {
    if (s.hasBase && pH > 8) {
      s.targetColor.set(0x1a6b44); // Cu(OH)2 precipitate – greenish teal
    } else {
      s.targetColor.set(0x0d47a1); // Deep blue
    }
    return;
  }

  // Universal indicator colors (rainbow with pH)
  if (s.indicatorUniversal) {
    if      (pH < 3)  s.targetColor.set(0xc62828); // deep red
    else if (pH < 5)  s.targetColor.set(0xf57c00); // orange
    else if (pH < 6)  s.targetColor.set(0xf9a825); // yellow-orange
    else if (pH < 7)  s.targetColor.set(0xafb42b); // yellow-green
    else if (pH < 8)  s.targetColor.set(0x388e3c); // green
    else if (pH < 9)  s.targetColor.set(0x0288d1); // blue
    else if (pH < 10) s.targetColor.set(0x5e35b1); // indigo
    else              s.targetColor.set(0x8e24aa); // violet
    return;
  }

  // Phenolphthalein: colourless in acid/neutral, magenta in base > 8.3
  if (s.indicatorPhenol) {
    if (pH > 8.3) {
      // Intensity of magenta scales with how alkaline it is
      const intensity = Math.min(1, (pH - 8.3) / 3);
      const r = Math.floor(255 * intensity);
      const g = 0;
      const b = Math.floor(140 * intensity);
      s.targetColor.setRGB(r / 255, g / 255, b / 255);
    } else {
      s.targetColor.set(0xd4f1ff); // Nearly clear
    }
    return;
  }

  // Plain pH-dependent default
  if (pH < 4)       s.targetColor.set(0xff5252); // acid red
  else if (pH < 6.5) s.targetColor.set(0xffe082); // slight yellow
  else if (pH < 7.5) s.targetColor.set(0x9be7ff); // neutral water blue
  else if (pH < 9)  s.targetColor.set(0xce93d8); // light purple
  else              s.targetColor.set(0xab47bc); // base purple
}

/**
 * Clamp pH to [0, 14] and update the HUD color class.
 */
function clampAndDisplayPH() {
  LabState.pH = Math.max(0, Math.min(14, LabState.pH));
  const el = document.getElementById('ph-value');
  el.textContent = LabState.pH.toFixed(1);
  el.className   = 'hud-value ' + (LabState.pH < 6.5 ? 'acidic' : LabState.pH > 7.5 ? 'alkaline' : 'neutral');
}

/**
 * Update temperature display and class.
 */
function displayTemperature() {
  const el = document.getElementById('temp-value');
  el.textContent = LabState.temperature.toFixed(1);
  el.className   = 'hud-value ' + (LabState.temperature < 30 ? 'cold' : LabState.temperature < 80 ? 'warm' : 'hot');
}

// Full HUD refresh
function refreshHUD() {
  updateSubstanceLabel();
  document.getElementById('hud-substance').textContent = LabState.substance;
  document.getElementById('hud-volume').textContent    = Math.round(LabState.volume);
  clampAndDisplayPH();
  displayTemperature();
  recomputeTargetColor();
}

document.getElementById('btn-litmus').addEventListener('click', () => {

  document.getElementById('btn-litmus').classList.add('active');
  logReaction('Added <span class="log-highlight">Universal Indicator</span> – colour now tracks pH in real-time.');
  showToast('🎨 Universal indicator added.');
  refreshHUD();

  LabState.pH = Math.min(14, LabState.pH + 2.5);

  logReaction('Added <span class="log-highlight">NaOH</span> → pH ↑ to ' + LabState.pH.toFixed(1));
  showToast('⬆ NaOH added — solution basified.');
  refreshHUD();

/* Ammonia */
document.getElementById('btn-nh3').addEventListener('click', () => {

    logReaction('Added <span class="log-highlight">HCl</span> → pH ↓ to ' + LabState.pH.toFixed(1));
    showToast('⬇ HCl added — solution acidified.');

/* Bunsen Burner Toggle */
const btnHeat = document.getElementById('btn-heat');
btnHeat.addEventListener('click', () => {
  LabState.heatOn = !LabState.heatOn;
  btnHeat.classList.toggle('heat-on', LabState.heatOn);
  flameParticles.visible = LabState.heatOn;
  burnerLight.intensity  = LabState.heatOn ? 2.2 : 0;

  if (LabState.heatOn) {
    logReaction('<span class="log-highlight">Bunsen burner ON</span> — heating commenced.');
    showToast('🔥 Bunsen burner ignited.');
    // Ramp up temperature over time (simulated)
    LabState._tempInterval = setInterval(() => {
      if (!LabState.heatOn) { clearInterval(LabState._tempInterval); return; }
      LabState.temperature = Math.min(100, LabState.temperature + 0.35);
      if (LabState.temperature >= 100 && !steamParticles.visible) {
        steamParticles.visible = true;
        logReaction('<span class="log-highlight">Boiling point reached!</span> Steam forming above liquid.');
        showToast('💨 Solution is boiling!');
      }
      displayTemperature();
    }, 200);
  } else {
    clearInterval(LabState._tempInterval);
    steamParticles.visible = false;
    logReaction('Bunsen burner <span class="log-highlight">OFF</span> — cooling down.');
    showToast('❄ Burner off. Cooling…');
    // Cool down
    LabState._coolInterval = setInterval(() => {
      LabState.temperature = Math.max(20, LabState.temperature - 0.5);
      if (LabState.temperature <= 20) clearInterval(LabState._coolInterval);
      displayTemperature();
    }, 300);
  }
});

/* Stir Solution */
const btnStir = document.getElementById('btn-stir');
btnStir.addEventListener('click', () => {
  LabState.stirring = !LabState.stirring;
  btnStir.classList.toggle('stirring', LabState.stirring);
  rippleParticles.visible = LabState.stirring;
  if (LabState.stirring) {
    logReaction('<span class="log-highlight">Stirring initiated</span> — mixing solution.');
    showToast('🔄 Stirring solution…');
  } else {
    showToast('⏹ Stirring stopped.');
  }
});

/* Pour Off */
document.getElementById('btn-pour').addEventListener('click', () => {
  if (LabState.volume <= 10) { showToast('⚠ Container nearly empty.'); return; }
  const poured = Math.min(25, LabState.volume - 10);
  LabState.volume -= poured;
  liquidFillFraction = Math.max(0.05, (LabState.volume / 100) * 0.72);
  rebuildLiquidGeometry();
  repositionBeaker();
  logReaction(`Poured off <span class="log-highlight">${poured} mL</span> — ${LabState.volume} mL remaining.`);
  showToast(`💧 Poured off ${poured} mL.`);
  refreshHUD();
});

/* Reset Lab */
document.getElementById('btn-reset').addEventListener('click', () => {
  // Stop intervals
  clearInterval(LabState._tempInterval);
  clearInterval(LabState._coolInterval);

  // Reset state
  LabState.substance   = 'Distilled Water';
  LabState.volume      = 100;
  LabState.temperature = 20;
  LabState.pH          = 7.0;
  LabState.heatOn      = false;
  LabState.stirring    = false;
  LabState.indicatorPhenol   = false;
  LabState.indicatorUniversal = false;
  LabState.hasNaOH  = false;
  LabState.hasBase  = false;
  LabState.hasAcid  = false;
  LabState.compounds = [];
  LabState.targetColor.set(0x9be7ff);
  LabState.currentColor.set(0x9be7ff);

  // Reset visuals
  flameParticles.visible  = false;
  steamParticles.visible  = false;
  rippleParticles.visible = false;
  burnerLight.intensity   = 0;
  btnHeat.classList.remove('heat-on');
  btnStir.classList.remove('stirring');

  // Reset liquid geometry
  liquidFillFraction = 0.72;
  rebuildLiquidGeometry();
  repositionBeaker();
  liquidMat.color.set(0x9be7ff);
  surfaceMat.color.set(0x9be7ff);

  // Reset active button states
  document.querySelectorAll('.chem-btn.active').forEach(b => b.classList.remove('active'));

  // Clear reaction log
  const log = document.getElementById('reaction-log');
  while (log.children.length > 1) log.removeChild(log.lastChild);

  refreshHUD();
  logReaction('Lab environment <span class="log-highlight">reset</span> to baseline conditions.');
  showToast('🔄 Lab reset to initial conditions.');
});

// ---------------------------------------------------------------
// 14. CLOCK & ANIMATION STATE
// ---------------------------------------------------------------
let elapsedTime    = 0;
let stirAngle      = 0;
const clock        = new THREE.Clock();
const lerpFactor   = 0.025; // Colour LERP speed per frame

// ---------------------------------------------------------------
// 15. ANIMATION LOOP
// ---------------------------------------------------------------
function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  elapsedTime += delta;

  // --- Update OrbitControls (damping) ---
  controls.update();

  // ==========================================
  // A. LERP liquid colour toward target
  // ==========================================
  LabState.currentColor.lerp(LabState.targetColor, lerpFactor);
  liquidMat.color.copy(LabState.currentColor);
  surfaceMat.color.copy(LabState.currentColor);

  // Adjust opacity: clear solutions are more transparent
  const brightness = LabState.currentColor.r * 0.299 +
                     LabState.currentColor.g * 0.587 +
                     LabState.currentColor.b * 0.114;
  liquidMat.opacity = 0.35 + brightness * 0.4;

  // ==========================================
  // B. FLAME PARTICLE UPDATE
  // ==========================================
  if (flameParticles.visible) {
    const pos = flameGeometry.attributes.position.array;
    for (let i = 0; i < FLAME_COUNT; i++) {
      const idx = i * 3;
      // Move upward
      pos[idx + 1] += flameSpeeds[i] * delta * 0.9;
      // Slight horizontal drift (turbulence)
      pos[idx + 0] += (Math.random() - 0.5) * 0.012;
      pos[idx + 2] += (Math.random() - 0.5) * 0.012;
      // Increment lifetime
      flameLifetimes[i] += delta * flameSpeeds[i] * 0.9;

      // Reset particle when it rises above flame height or lifetime expires
      if (flameLifetimes[i] > 1.0 || pos[idx + 1] > 0.85) {
        initFlameParticle(i);
      }
    }
    flameGeometry.attributes.position.needsUpdate = true;

    // Flicker burner light
    burnerLight.intensity = 1.8 + Math.sin(elapsedTime * 18) * 0.4;
  }

  // ==========================================
  // C. STEAM PARTICLE UPDATE (Boiling)
  // ==========================================
  if (steamParticles.visible) {
    // Anchor steam to liquid surface
    const baseY = 2.2 + MAX_LIQUID_HEIGHT * liquidFillFraction + 0.03;
    steamParticles.position.set(-0.85, baseY, 0);

    const spos = steamGeometry.attributes.position.array;
    for (let i = 0; i < STEAM_COUNT; i++) {
      const idx = i * 3;
      spos[idx + 1] += steamSpeeds[i] * delta * 0.55;
      // Gentle horizontal drift
      spos[idx + 0] += (Math.random() - 0.5) * 0.007;
      spos[idx + 2] += (Math.random() - 0.5) * 0.007;
      steamLifetimes[i] += delta;
      if (steamLifetimes[i] > 1.6 || spos[idx + 1] > 1.8) {
        initSteamParticle(i);
      }
    }
    steamGeometry.attributes.position.needsUpdate = true;
    // Pulsate opacity for realism
    steamMaterial.opacity = 0.3 + Math.sin(elapsedTime * 3) * 0.15;
  }

  // ==========================================
  // D. RIPPLE PARTICLE UPDATE (Stirring)
  // ==========================================
  if (rippleParticles.visible) {
    stirAngle += delta * 3.5;
    const rpos = rippleGeometry.attributes.position.array;
    for (let i = 0; i < RIPPLE_COUNT; i++) {
      const idx   = i * 3;
      const phase = rippleAngles[i] + stirAngle;
      // Spiral outward then reset
      rippleRadii[i] += delta * 0.4;
      if (rippleRadii[i] > 0.62) rippleRadii[i] = 0.05 + Math.random() * 0.1;
      rpos[idx + 0] = Math.cos(phase) * rippleRadii[i];
      rpos[idx + 2] = Math.sin(phase) * rippleRadii[i];
      rpos[idx + 1] = (Math.random() - 0.5) * 0.04;
    }
    rippleGeometry.attributes.position.needsUpdate = true;
    // Position at liquid surface
    const baseY = 2.2 + MAX_LIQUID_HEIGHT * liquidFillFraction + 0.01;
    rippleParticles.position.set(-0.85, baseY, 0);
    rippleMat.color.copy(LabState.currentColor);
  }

  // ==========================================
  // E. AMBIENT ANIMATIONS
  // ==========================================

  // Subtle beaker shimmer (specular pulse)
  glassMat.opacity = 0.20 + Math.sin(elapsedTime * 0.9) * 0.03;

  // Gentle camera sway (very subtle – only if user not interacting)
  // (Orbit controls handle user interaction; this is extremely subtle)
  // camera.position.y += Math.sin(elapsedTime * 0.15) * 0.0008;

  // ==========================================
  // F. RENDER
  // ==========================================
  renderer.render(scene, camera);
}

// ---------------------------------------------------------------
// 16. WINDOW RESIZE HANDLER
// ---------------------------------------------------------------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
});

// ---------------------------------------------------------------
// 17. INITIAL SCENE SETUP & HIDE LOADING OVERLAY
// ---------------------------------------------------------------
function init() {
  // Position all geometry correctly
  rebuildLiquidGeometry();
  repositionBeaker();
  refreshHUD();

  // Initial log entry
  logReaction('Lab initialized. Beaker contains <span class="log-highlight">100 mL Distilled Water</span> (pH 7.0, 20°C).');

  // Start animation loop
  animate();

  // Hide loading screen after brief delay (gives Three.js a frame to render)
  setTimeout(() => {
    document.getElementById('loading-overlay').classList.add('hidden');
    // Remove from DOM after transition
    setTimeout(() => document.getElementById('loading-overlay').remove(), 900);
  }, 1500);
}

init();
